name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore Avelia.sln

      - name: Build
        run: dotnet build Avelia.sln --no-restore -c Release

      - name: Fast tests
        shell: pwsh
        run: ./scripts/test-fast.ps1

      - name: Integration tests
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: ./scripts/test-integration.ps1
